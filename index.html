<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamTupe Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body id="app-body" class="dark-theme">

    <section id="search-section" class="app-page active">
        <div class="hero">
            <h1 class="logo-text">SamTupe Pro</h1>
            <div class="search-container">
                <input type="text" id="video-url" placeholder="ضع رابط الفيديو هنا...">
                <button onclick="analyzeVideo()"><i class="fas fa-magic"></i></button>
            </div>
        </div>
        <div id="preview-area"></div>
    </section>

    <section id="settings-section" class="app-page">
        <h2 class="section-title">الإعدادات المتقدمة</h2>
        
        <div class="settings-group">
            <h3><i class="fas fa-cog"></i> إعدادات التحميل</h3>
            <div class="setting-item">
                <span>المظهر (السمة)</span>
                <select id="theme-select" onchange="changeTheme()">
                    <option value="dark">داكن</option>
                    <option value="light">مضيء</option>
                    <option value="gold">ذهبي</option>
                </select>
            </div>
            <div class="setting-item">
                <span>سرعة التحميل (Turbo)</span>
                <select id="download-speed">
                    <option value="normal">عادية</option>
                    <option value="fast">سريعة جداً</option>
                </select>
            </div>
        </div>

        <div class="settings-group">
            <h3><i class="fas fa-user-shield"></i> الأمان والخصوصية</h3>
            <div class="setting-item" onclick="openVault()">
                <span>الخزانة السرية</span>
                <i class="fas fa-lock"></i>
            </div>
        </div>

        <div class="settings-group">
            <h3><i class="fas fa-info-circle"></i> النظام</h3>
            <div class="setting-item" onclick="showAbout()">
                <span>حول البرنامج</span>
                <span>V 2.1.0</span>
            </div>
        </div>
    </section>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showPage('search-section', this)">
            <i class="fas fa-search"></i><span>بحث</span>
        </div>
        <div class="nav-item" onclick="showPage('settings-section', this)">
            <i class="fas fa-cog"></i><span>الإعدادات</span>
        </div>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="firebase-config.js"></script>
    <script src="main.js"></script>
</body>
</html>
