<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>SamTupe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- تسجيل الدخول -->
<div id="authBox" class="auth-box">
  <h2>SamTupe</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">دخول</button>
  <button onclick="register()">إنشاء حساب</button>
</div>

<!-- القائمة الجانبية -->
<div id="drawer" class="drawer">
  <h2>SamTupe</h2>
  <ul>
    <li onclick="toggleTheme()">🌙 الوضع الليلي</li>
    <li onclick="logout()">🚪 تسجيل الخروج</li>
  </ul>
</div>

<!-- Header -->
<header>
  <button onclick="openDrawer()">☰</button>
  <h1>SamTupe</h1>
</header>

<!-- البحث -->
<div class="search-container">
  <input id="searchInput" type="text" placeholder="ابحث أو أدخل رابط">
  <button onclick="search()">🔍</button>
</div>

<!-- روابط -->
<div class="quick-grid">
  <div onclick="loadSite('https://www.google.com')" class="card">Google</div>
  <div onclick="loadSite('https://www.youtube.com')" class="card">YouTube</div>
  <div onclick="loadSite('https://www.facebook.com')" class="card">Facebook</div>
  <div onclick="loadSite('https://www.instagram.com')" class="card">Instagram</div>
</div>

<!-- زر حفظ -->
<div style="text-align:center;">
  <button onclick="saveFavorite()">⭐ حفظ الصفحة</button>
</div>

<!-- عرض المفضلة -->
<div id="favorites"></div>

<!-- المتصفح -->
<iframe id="browser" src="https://www.google.com"></iframe>

<script type="module" src="firebase.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
