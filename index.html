<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamTupe Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Header -->
<header>
  <button onclick="toggleDrawer()">☰</button>
  <h1>SamTupe</h1>
</header>

<!-- Drawer -->
<div id="drawer" class="drawer">
  <h2>SamTupe</h2>
  <p onclick="showPage('home')">🏠 الرئيسية</p>
  <p onclick="showPage('fav')">⭐ المفضلة</p>
  <p onclick="showPage('settings')">⚙️ الإعدادات</p>
  <p onclick="logout()">🚪 خروج</p>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="search-box">
    <input id="searchInput" placeholder="ابحث أو أدخل رابط">
    <button onclick="search()">🔍</button>
  </div>

  <div class="grid">
    <div onclick="openSite('https://www.google.com')" class="card">Google</div>
    <div onclick="openSite('https://www.youtube.com')" class="card">YouTube</div>
    <div onclick="openSite('https://www.facebook.com')" class="card">Facebook</div>
    <div onclick="openSite('https://www.instagram.com')" class="card">Instagram</div>
  </div>
</div>

<!-- FAVORITES -->
<div id="fav" class="page">
  <h2>⭐ المفضلة</h2>
  <div id="favList"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
  <h2>⚙️ الإعدادات</h2>
  <button onclick="toggleTheme()">🌙 الوضع الليلي</button>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <button onclick="showPage('home')">🏠</button>
  <button onclick="showPage('fav')">⭐</button>
  <button onclick="showPage('settings')">⚙️</button>
</nav>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
