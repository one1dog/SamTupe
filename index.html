<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamTupe Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark-theme">

    <section id="search-section" class="app-page active">
        <div class="hero">
            <h1 class="logo-text">SamTupe</h1>
            <div class="search-container">
                <input type="text" id="video-url" placeholder="ضع رابط الفيديو هنا...">
                <button onclick="analyzeVideo()"><i class="fas fa-magic"></i></button>
            </div>
        </div>
        <div id="preview-area"></div>
    </section>

    <section id="settings-section" class="app-page">
        <h2 class="section-title">الإعدادات</h2>
        <div class="settings-group">
            <div class="setting-item">
                <span><i class="fas fa-palette"></i> المظهر (السمة)</span>
                <select id="theme-select" onchange="changeTheme()">
                    <option value="dark">داكن</option>
                    <option value="light">مضيء</option>
                    <option value="gold">ذهبي</option>
                </select>
            </div>
            <div class="setting-item">
                <span><i class="fas fa-language"></i> اللغة</span>
                <select id="lang-select">
                    <option value="ar">العربية</option>
                    <option value="en">English</option>
                </select>
            </div>
        </div>
    </section>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showPage('search-section', this)">
            <i class="fas fa-search"></i><span>بحث</span>
        </div>
        <div class="nav-item" onclick="showPage('settings-section', this)">
            <i class="fas fa-cog"></i><span>الإعدادات</span>
        </div>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="firebase-config.js"></script>
    <script src="main.js"></script>
</body>
</html>
